name: Build and Push Docker Image

on:
  workflow_dispatch:
    inputs:
      custom_tags:
        description: Custom image tags, separated by commas
        required: false
        default: ''
        type: string
      tag_prefix:
        description: Prefix used when generating tags automatically
        required: false
        default: manual
        type: choice
        options:
          - manual
          - test
          - debug
          - dev
          - staging
          - hotfix
          - feature
      include_beta_tags:
        description: Include default channel tags
        required: false
        default: true
        type: boolean
      push_to_dockerhub:
        description: Push to Docker Hub
        required: false
        default: true
        type: boolean
      push_to_cnb:
        description: Push to CNB.Cool
        required: false
        default: true
        type: boolean
      platforms:
        description: Docker platforms to build
        required: false
        default: linux/amd64,linux/arm64
        type: choice
        options:
          - linux/amd64,linux/arm64
          - linux/amd64
          - linux/arm64

env:
  REGISTRY: docker.io
  IMAGE_NAME: qq1582185982/bili-sync
  CNB_REGISTRY: docker.cnb.cool
  CNB_IMAGE_NAME: sviplk.com/docker/bili-sync

jobs:
  prepare_release:
    name: Determine release channel
    runs-on: ubuntu-24.04
    outputs:
      release_channel: ${{ steps.release_channel.outputs.release_channel }}
    steps:
      - name: Determine release channel
        id: release_channel
        shell: bash
        run: |
          set -euo pipefail
          channel=""

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.custom_tags }}" ]]; then
            tags_raw="${{ github.event.inputs.custom_tags }}"
            has_stable=0
            has_beta=0
            has_dev=0

            IFS=',' read -ra tags <<< "$tags_raw"
            for tag in "${tags[@]}"; do
              tag="$(echo "$tag" | xargs | tr '[:upper:]' '[:lower:]')"
              [[ -z "$tag" ]] && continue
              case "$tag" in
                latest|stable) has_stable=1 ;;
              esac
              [[ "$tag" == *beta* ]] && has_beta=1
              [[ "$tag" == *dev* ]] && has_dev=1
            done

            count=$((has_stable + has_beta + has_dev))
            if [[ "$count" -gt 1 ]]; then
              echo "custom_tags cannot mix stable, beta, and dev channels in one build" >&2
              exit 1
            fi

            [[ "$has_stable" -eq 1 ]] && channel="stable"
            [[ "$has_beta" -eq 1 ]] && channel="beta"
            [[ "$has_dev" -eq 1 ]] && channel="dev"
          fi

          if [[ -z "$channel" ]]; then
            if [[ "${GITHUB_REF_TYPE}" == "branch" ]]; then
              case "${GITHUB_REF_NAME}" in
                dev) channel="dev" ;;
                beta) channel="beta" ;;
                main|master) channel="stable" ;;
                *) channel="beta" ;;
              esac
            else
              if [[ "${GITHUB_REF_NAME}" == *beta* ]]; then
                channel="beta"
              else
                channel="stable"
              fi
            fi
          fi

          echo "release_channel=$channel" >> "$GITHUB_OUTPUT"
          echo "Release channel: $channel"

  build_frontend:
    name: Build frontend
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v6
        with:
          name: web-build
          path: web/build

  build_binaries:
    name: Build Linux binaries
    needs:
      - prepare_release
      - build_frontend
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        platform:
          - target: x86_64-unknown-linux-musl
            name: Linux-x86_64-musl
            bin: bili-sync-rs
            archive_name: bili-sync-rs-Linux-x86_64-musl.tar.gz
          - target: aarch64-unknown-linux-musl
            name: Linux-aarch64-musl
            bin: bili-sync-rs
            archive_name: bili-sync-rs-Linux-aarch64-musl.tar.gz
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Reset frontend build output
        shell: bash
        run: |
          rm -rf web/build
          mkdir -p web/build

      - name: Download frontend artifact
        uses: actions/download-artifact@v8
        with:
          name: web-build
          path: web/build

      - name: Read Rust toolchain version
        id: read_rust_toolchain
        shell: bash
        run: |
          channel=$(grep '^channel' rust-toolchain.toml | sed 's/.*= *"\(.*\)"/\1/')
          echo "value=$channel" >> "$GITHUB_OUTPUT"

      - name: Install unzip on Linux runners
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip

      - name: Build binary
        uses: houseabsolute/actions-rust-cross@v1
        env:
          BILI_SYNC_RELEASE_CHANNEL: ${{ needs.prepare_release.outputs.release_channel }}
        with:
          command: build
          target: ${{ matrix.platform.target }}
          toolchain: ${{ steps.read_rust_toolchain.outputs.value }}
          args: "--locked --release -p bili_sync"
          strip: true

      - name: Package archive
        shell: bash
        run: |
          cd target/${{ matrix.platform.target }}/release
          tar czf "../../../${{ matrix.platform.archive_name }}" "${{ matrix.platform.bin }}"

      - name: Upload binary archive
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.platform.archive_name }}
          path: ${{ github.workspace }}/${{ matrix.platform.archive_name }}

  build_and_push:
    name: Build and Push Docker Image
    needs:
      - prepare_release
      - build_binaries
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download Linux x86_64 binary
        uses: actions/download-artifact@v8
        with:
          name: bili-sync-rs-Linux-x86_64-musl.tar.gz
          path: ./

      - name: Download Linux ARM64 binary
        uses: actions/download-artifact@v8
        with:
          name: bili-sync-rs-Linux-aarch64-musl.tar.gz
          path: ./

      - name: List downloaded files
        run: ls -la *.tar.gz

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to CNB.Cool Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: docker.cnb.cool
          username: cnb
          password: ${{ secrets.CNB_PASSWORD }}

      - name: Prepare Docker tags
        id: tags
        shell: bash
        run: |
          dockerhub_tags=""
          cnb_tags=""
          channel="${{ needs.prepare_release.outputs.release_channel }}"

          if [[ "${{ github.event_name }}" != "workflow_dispatch" ]] || [[ "${{ github.event.inputs.include_beta_tags }}" == "true" ]]; then
            case "$channel" in
              stable)
                dockerhub_tags="${{ env.IMAGE_NAME }}:latest"
                cnb_tags="docker.cnb.cool/${{ env.CNB_IMAGE_NAME }}:latest"
                ;;
              beta)
                dockerhub_tags="${{ env.IMAGE_NAME }}:beta,${{ env.IMAGE_NAME }}:beta-latest"
                cnb_tags="docker.cnb.cool/${{ env.CNB_IMAGE_NAME }}:beta,docker.cnb.cool/${{ env.CNB_IMAGE_NAME }}:beta-latest"
                ;;
              dev)
                dockerhub_tags="${{ env.IMAGE_NAME }}:dev,${{ env.IMAGE_NAME }}:dev-latest"
                cnb_tags="docker.cnb.cool/${{ env.CNB_IMAGE_NAME }}:dev,docker.cnb.cool/${{ env.CNB_IMAGE_NAME }}:dev-latest"
                ;;
              *)
                echo "Unknown release channel: $channel" >&2
                exit 1
                ;;
            esac
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            prefix="${{ github.event.inputs.tag_prefix }}"
            if [[ -n "${{ github.event.inputs.custom_tags }}" ]]; then
              IFS=',' read -ra custom_tags <<< "${{ github.event.inputs.custom_tags }}"
              for tag in "${custom_tags[@]}"; do
                tag="$(echo "$tag" | xargs)"
                [[ -z "$tag" ]] && continue
                if [[ -n "$dockerhub_tags" ]]; then
                  dockerhub_tags="$dockerhub_tags,${{ env.IMAGE_NAME }}:$tag"
                  cnb_tags="$cnb_tags,docker.cnb.cool/${{ env.CNB_IMAGE_NAME }}:$tag"
                else
                  dockerhub_tags="${{ env.IMAGE_NAME }}:$tag"
                  cnb_tags="docker.cnb.cool/${{ env.CNB_IMAGE_NAME }}:$tag"
                fi
              done
            else
              timestamp=$(date +%Y%m%d-%H%M%S)
              if [[ -n "$dockerhub_tags" ]]; then
                dockerhub_tags="$dockerhub_tags,${{ env.IMAGE_NAME }}:$prefix-$timestamp"
                cnb_tags="$cnb_tags,docker.cnb.cool/${{ env.CNB_IMAGE_NAME }}:$prefix-$timestamp"
              else
                dockerhub_tags="${{ env.IMAGE_NAME }}:$prefix-$timestamp"
                cnb_tags="docker.cnb.cool/${{ env.CNB_IMAGE_NAME }}:$prefix-$timestamp"
              fi
            fi
          fi

          if [[ -z "$dockerhub_tags" && -z "$cnb_tags" ]]; then
            echo "No image tags were generated" >&2
            exit 1
          fi

          echo "dockerhub_tags=$dockerhub_tags" >> "$GITHUB_OUTPUT"
          echo "cnb_tags=$cnb_tags" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.IMAGE_NAME }}
            docker.cnb.cool/${{ env.CNB_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Combine all tags for single build
        id: all_tags
        shell: bash
        run: |
          all_tags=""

          if [[ "${{ github.event_name != 'workflow_dispatch' || github.event.inputs.push_to_dockerhub == 'true' }}" == "true" ]]; then
            if [[ -n "${{ steps.tags.outputs.dockerhub_tags }}" ]]; then
              all_tags="${{ steps.tags.outputs.dockerhub_tags }}"
            fi
          fi

          if [[ "${{ github.event_name != 'workflow_dispatch' || github.event.inputs.push_to_cnb == 'true' }}" == "true" ]]; then
            if [[ -n "${{ steps.tags.outputs.cnb_tags }}" ]]; then
              if [[ -n "$all_tags" ]]; then
                all_tags="$all_tags,${{ steps.tags.outputs.cnb_tags }}"
              else
                all_tags="${{ steps.tags.outputs.cnb_tags }}"
              fi
            fi
          fi

          if [[ -z "$all_tags" ]]; then
            echo "No enabled image tags were generated for the selected registries" >&2
            exit 1
          fi

          echo "all_tags=$all_tags" >> "$GITHUB_OUTPUT"

      - name: Build and push to all registries
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ github.event.inputs.platforms || 'linux/amd64,linux/arm64' }}
          push: true
          tags: ${{ steps.all_tags.outputs.all_tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            BILI_SYNC_RELEASE_CHANNEL=${{ needs.prepare_release.outputs.release_channel }}

      - name: Test Docker image
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          first_tag=$(echo "${{ steps.all_tags.outputs.all_tags }}" | cut -d',' -f1)
          if [[ -n "$first_tag" ]]; then
            docker run --rm "$first_tag" --help | head -5 || echo "Docker image test completed"
          else
            echo "No tags to test"
          fi
